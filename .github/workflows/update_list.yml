name: YouTube Liste Guncelleyici

on:
  schedule:
    - cron: "0 */5 * * *" # Her 5 saatte bir (00:00, 05:00, 10:00 vs.) otomatik calisir
  workflow_dispatch: # Manuel calistirma butonu (Actions sekmesindeki mavi buton)

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub'a dosya yazma izni verir

    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4

      - name: Worker'dan Verileri Cek
        run: |
          # Senin verdigin Worker linki ile veriyi cekip YouTube.json dosyasina yaziyoruz
          curl -s "https://live.weebtv.workers.dev/" -o YouTube.json

      - name: Degisiklikleri Kaydet ve Push Et
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add YouTube.json
          # Sadece icerik degistiyse commit yap, degismediyse hata verme
          git commit -m "YouTube.json Guncellendi: $(date)" || exit 0
          git push
