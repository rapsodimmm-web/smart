name: YouTube Liste Guncelleyici

on:
  schedule:
    - cron: "0 */5 * * *"
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4

      - name: Worker'dan Verileri Cek
        run: |
          # -L: Yönlendirmeleri takip eder
          # -k: SSL sertifika hatalarını görmezden gelir (bağlantı hatasını çözer)
          # -s: Sessiz mod
          curl -L -k -s "https://live.weebtv.workers.dev/" -o YouTube.json

      - name: Dosya Boyutunu Kontrol Et
        run: |
          # Eğer dosya boşsa işlemi durdur (hatalı kayıt yapmamak için)
          if [ ! -s YouTube.json ]; then
            echo "HATA: Veri çekilemedi, dosya boş!"
            exit 1
          fi

      - name: Degisiklikleri Kaydet ve Push Et
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add YouTube.json
          git commit -m "YouTube.json Guncellendi: $(date)" || exit 0
          git push
